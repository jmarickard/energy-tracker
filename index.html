<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>Energy Price Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --sign-bg: #243010;
    --sign-border: #3a4e22;
    --sign-border-outer: #1a2608;
    --cream: #f5e6c8;
    --amber: #ffb300;
    --red: #e53935;
    --green: #43a047;
    --dim: #8a7e6a;
    --price-bg: #0a0a0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 50px 50px;
    gap: 40px;
  }

  /* === SIGN FRAME === */
  .sign {
    background: var(--sign-bg);
    border: 8px solid var(--sign-border);
    border-radius: 24px;
    outline: 5px solid var(--sign-border-outer);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 3px 15px rgba(255,255,255,0.05);
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* === HEADER === */
  .sign-header {
    text-align: center;
    border-bottom: 4px solid var(--sign-border);
    padding-bottom: 24px;
    margin-bottom: 30px;
    flex-shrink: 0;
  }

  .sign-header h1 {
    font-size: 58px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
    text-shadow: 0 0 15px rgba(245,230,200,0.3);
  }

  .sign-header .location {
    font-size: 28px;
    color: var(--dim);
    margin-top: 10px;
    letter-spacing: 0.1em;
  }

  /* === PRICE ROW === */
  .price-row {
    display: flex;
    align-items: stretch;
    gap: 30px;
    flex: 1;
  }

  .price-label {
    display: flex;
    flex-direction: column;
    justify-content: center;
    width: 200px;
    flex-shrink: 0;
    font-size: 40px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--cream);
  }

  .price-label .sub {
    font-size: 20px;
    color: var(--dim);
    margin-top: 6px;
  }

  .price-display {
    background: var(--price-bg);
    border: 3px solid #333;
    border-radius: 8px;
    padding: 20px 35px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    box-shadow: inset 0 3px 12px rgba(0,0,0,0.8);
  }

  .price-value {
    font-size: 96px;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255,179,0,0.4);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .price-unit {
    font-size: 22px;
    color: var(--dim);
    margin-top: 8px;
  }

  .price-change {
    font-size: 26px;
    margin-top: 6px;
  }

  .up { color: var(--red); }
  .down { color: var(--green); }
  .neutral { color: var(--dim); }

  /* === DIVIDER === */
  .divider {
    border: none;
    border-top: 3px dashed var(--sign-border);
    margin: 0;
    flex-shrink: 0;
  }

  /* === FUEL GRADE BOARD === */
  .fuel-board {
    background: var(--sign-bg);
    border: 8px solid var(--sign-border);
    border-radius: 24px;
    outline: 5px solid var(--sign-border-outer);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 3px 15px rgba(255,255,255,0.05);
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    flex: 1.4;
  }

  .board-header {
    text-align: center;
    flex-shrink: 0;
    margin-bottom: 20px;
  }

  .board-title {
    font-size: 44px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
    text-shadow: 0 0 12px rgba(245,230,200,0.2);
  }

  .board-subtitle {
    font-size: 22px;
    color: var(--dim);
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  .fuel-grid {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 0;
  }

  .fuel-row {
    display: flex;
    align-items: center;
    gap: 30px;
    flex: 1;
    border-bottom: 2px solid #333;
  }

  .fuel-row:last-child {
    border-bottom: none;
  }

  .fuel-grade {
    flex: 1;
    font-size: 44px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--cream);
  }

  .fuel-price-box {
    background: var(--price-bg);
    border: 3px solid #333;
    border-radius: 6px;
    padding: 14px 40px;
    text-align: center;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
    min-width: 320px;
  }

  .fuel-price-val {
    font-size: 72px;
    color: var(--amber);
    text-shadow: 0 0 10px rgba(255,179,0,0.3);
    font-variant-numeric: tabular-nums;
  }

  /* === FOOTER === */
  .footer {
    text-align: center;
    flex-shrink: 0;
  }

  .footer .clock {
    font-size: 64px;
    color: var(--amber);
    text-shadow: 0 0 12px rgba(255,179,0,0.3);
    font-variant-numeric: tabular-nums;
  }

  .footer .last-update {
    font-size: 22px;
    color: var(--dim);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* Loading / Error */
  .loading {
    color: var(--dim);
    font-size: 36px;
    text-align: center;
    padding: 30px 0;
    align-self: center;
  }

  .error-msg {
    color: var(--red);
    font-size: 26px;
    text-align: center;
    padding: 20px 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<!-- MAIN SIGN -->
<div class="sign">
  <div class="sign-header">
    <h1>Today's Energy Prices</h1>
    <div class="location">Cape Girardeau, MO</div>
  </div>

  <div class="price-row">
    <div class="price-label">Crude Oil<span class="sub">WTI Spot</span></div>
    <div class="price-display">
      <div class="price-value" id="crude-price">--</div>
      <div class="price-unit">per barrel</div>
      <div class="price-change neutral" id="crude-change">--</div>
    </div>
  </div>

  <hr class="divider">

  <div class="price-row">
    <div class="price-label">Electric<span class="sub">MO Residential</span></div>
    <div class="price-display">
      <div class="price-value" id="elec-price">--</div>
      <div class="price-unit">cents / kWh</div>
      <div class="price-change neutral" id="elec-period">--</div>
    </div>
  </div>
</div>

<!-- FUEL GRADE BOARD -->
<div class="fuel-board">
  <div class="board-header">
    <div class="board-title">Midwest Fuel Prices</div>
    <div class="board-subtitle" id="avg-update-info">Weekly via EIA</div>
  </div>
  <div class="fuel-grid" id="fuel-grid">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="clock" id="clock">--:--</div>
  <div class="last-update" id="last-update">Last refresh: --</div>
</div>

<script>
const EIA_API_KEY = '4Chg5i2sMidH1VXagwA16Swah93vp8bFZRQJ5wbl';

const REFRESH_CRUDE_MS   = 2 * 60 * 60 * 1000;
const REFRESH_ELEC_MS    = 12 * 60 * 60 * 1000;
const REFRESH_MIDWEST_MS = 6 * 60 * 60 * 1000;

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
setInterval(updateClock, 1000);
updateClock();

function stampUpdate() {
  const now = new Date();
  document.getElementById('last-update').textContent =
    'Last refresh: ' + now.toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true
    });
}

async function fetchCrude() {
  try {
    const url = `https://api.eia.gov/v2/petroleum/pri/spt/data/?api_key=${EIA_API_KEY}`
      + `&frequency=daily&data[0]=value&facets[series][]=RWTC`
      + `&sort[0][column]=period&sort[0][direction]=desc&length=2`;
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.response.data;
    if (!rows || rows.length === 0) throw new Error('No crude data');
    const latest = rows[0];
    const prev = rows[1] || null;
    document.getElementById('crude-price').textContent = '$' + Number(latest.value).toFixed(2);
    if (prev) {
      const diff = latest.value - prev.value;
      const pct = ((diff / prev.value) * 100).toFixed(1);
      const arrow = diff > 0 ? '\u25B2' : diff < 0 ? '\u25BC' : '';
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
      document.getElementById('crude-change').textContent = `${arrow} $${Math.abs(diff).toFixed(2)} (${Math.abs(pct)}%)`;
      document.getElementById('crude-change').className = 'price-change ' + cls;
    }
  } catch (e) {
    document.getElementById('crude-price').textContent = '--';
    document.getElementById('crude-change').textContent = 'Error loading';
  }
}

async function fetchElectricity() {
  try {
    const url = `https://api.eia.gov/v2/electricity/retail-sales/data/?api_key=${EIA_API_KEY}`
      + `&frequency=monthly&data[0]=price&facets[stateid][]=MO&facets[sectorid][]=RES`
      + `&sort[0][column]=period&sort[0][direction]=desc&length=1`;
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.response.data;
    if (!rows || rows.length === 0) throw new Error('No electricity data');
    const latest = rows[0];
    document.getElementById('elec-price').textContent = Number(latest.price).toFixed(1) + '\u00A2';
    document.getElementById('elec-period').textContent = latest.period + ' avg';
  } catch (e) {
    document.getElementById('elec-price').textContent = '--';
    document.getElementById('elec-period').textContent = 'Error loading';
  }
}

async function fetchMidwestAvg() {
  try {
    const products = [
      { code: 'EPM0',     label: 'Regular'  },
      { code: 'EPMM',     label: 'Midgrade' },
      { code: 'EPMP',     label: 'Premium'  },
      { code: 'EPD2DXL0', label: 'Diesel'   }
    ];
    const fetches = products.map(async (p) => {
      const url = `https://api.eia.gov/v2/petroleum/pri/gnd/data/?api_key=${EIA_API_KEY}`
        + `&frequency=weekly&data[0]=value&facets[duoarea][]=R20&facets[product][]=${p.code}`
        + `&sort[0][column]=period&sort[0][direction]=desc&length=1`;
      const res = await fetch(url);
      const json = await res.json();
      const rows = json.response.data;
      return {
        label: p.label,
        value: rows && rows.length > 0 ? rows[0].value : null,
        period: rows && rows.length > 0 ? rows[0].period : null
      };
    });
    const results = await Promise.all(fetches);
    const container = document.getElementById('fuel-grid');
    container.innerHTML = '';
    let periodStr = '';
    results.forEach(r => {
      if (r.period && !periodStr) periodStr = r.period;
      const row = document.createElement('div');
      row.className = 'fuel-row';
      row.innerHTML = `
        <div class="fuel-grade">${r.label}</div>
        <div class="fuel-price-box">
          <div class="fuel-price-val">${r.value !== null ? '$' + Number(r.value).toFixed(2) : '--'}</div>
        </div>`;
      container.appendChild(row);
    });
    if (periodStr) document.getElementById('avg-update-info').textContent = 'Week of ' + periodStr;
  } catch (e) {
    document.getElementById('fuel-grid').innerHTML = '<div class="error-msg">Error loading fuel prices</div>';
  }
}

async function init() {
  await Promise.allSettled([fetchCrude(), fetchElectricity(), fetchMidwestAvg()]);
  stampUpdate();
}

init();
setInterval(async () => { await fetchCrude(); stampUpdate(); }, REFRESH_CRUDE_MS);
setInterval(async () => { await fetchElectricity(); stampUpdate(); }, REFRESH_ELEC_MS);
setInterval(async () => { await fetchMidwestAvg(); stampUpdate(); }, REFRESH_MIDWEST_MS);
</script>
</body>
</html>
