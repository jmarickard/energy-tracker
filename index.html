<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Price Tracker</title>
<style>
  :root {
    --bg: #243010;
    --card-bg: #2d3d18;
    --card-border: #3a4e22;
    --text: #e8edf5;
    --text-dim: #7a8ba8;
    --accent-green: #22c55e;
    --accent-red: #ef4444;
    --accent-blue: #3b82f6;
    --accent-amber: #f59e0b;
    --accent-purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 2vh 2.5vw;
    gap: 1.8vh;
    overflow: hidden;
  }

  .header {
    text-align: center;
    padding: 1.5vh 0 0.5vh;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 3.2vh;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .header .location {
    font-size: 1.8vh;
    color: var(--text-dim);
    margin-top: 0.4vh;
  }

  .section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 1.2vh;
    padding: 2vh 2.5vw;
    flex-shrink: 0;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 1vw;
    margin-bottom: 1.5vh;
    font-size: 2vh;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .section-title .dot {
    width: 1.2vh;
    height: 1.2vh;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-title .update-info {
    font-size: 1.3vh;
    color: var(--text-dim);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    margin-left: auto;
  }

  /* --- Crude Oil & Electricity (hero cards) --- */
  .hero-row {
    display: flex;
    gap: 2.5vw;
  }

  .hero-card {
    flex: 1;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 1.2vh;
    padding: 2.5vh 2.5vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .hero-card .label {
    font-size: 1.7vh;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.8vh;
  }

  .hero-card .price {
    font-size: 6vh;
    font-weight: 700;
    line-height: 1;
  }

  .hero-card .unit {
    font-size: 1.8vh;
    color: var(--text-dim);
    margin-top: 0.5vh;
  }

  .hero-card .change {
    font-size: 2vh;
    margin-top: 0.8vh;
    font-weight: 600;
  }

  .up { color: var(--accent-red); }
  .down { color: var(--accent-green); }
  .neutral { color: var(--text-dim); }

  /* --- Gas Prices Section --- */
  .gas-grid {
    display: flex;
    flex-direction: column;
    gap: 1.2vh;
  }

  .gas-row {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.02);
    border-radius: 0.8vh;
    padding: 1.5vh 2vw;
    gap: 2vw;
  }

  .gas-row .station-name {
    flex: 1;
    font-size: 2vh;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .gas-row .station-addr {
    flex: 1.2;
    font-size: 1.5vh;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .gas-row .gas-price {
    font-size: 3vh;
    font-weight: 700;
    min-width: 12vw;
    text-align: right;
  }

  .gas-row .gas-age {
    font-size: 1.3vh;
    color: var(--text-dim);
    min-width: 10vw;
    text-align: right;
  }

  /* --- Midwest Avg Section --- */
  .avg-row {
    display: flex;
    justify-content: space-around;
    gap: 2vw;
    flex-wrap: wrap;
  }

  .avg-item {
    text-align: center;
    flex: 1;
    min-width: 18vw;
  }

  .avg-item .grade {
    font-size: 1.5vh;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5vh;
  }

  .avg-item .avg-price {
    font-size: 3.8vh;
    font-weight: 700;
  }

  /* --- Footer --- */
  .footer {
    margin-top: auto;
    text-align: center;
    padding: 1vh 0;
    flex-shrink: 0;
  }

  .footer .clock {
    font-size: 3vh;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .footer .last-update {
    font-size: 1.4vh;
    color: var(--text-dim);
    margin-top: 0.3vh;
  }

  /* Loading / Error states */
  .loading {
    color: var(--text-dim);
    font-size: 2vh;
    text-align: center;
    padding: 2vh 0;
  }

  .error-msg {
    color: var(--accent-red);
    font-size: 1.5vh;
    text-align: center;
    padding: 1vh 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Energy Price Tracker</h1>
  <div class="location">Cape Girardeau, MO</div>
</div>

<!-- CRUDE OIL + ELECTRICITY -->
<div class="hero-row">
  <div class="hero-card" id="crude-card">
    <div class="label">Crude Oil (WTI)</div>
    <div class="price" id="crude-price">--</div>
    <div class="unit">per barrel</div>
    <div class="change neutral" id="crude-change">--</div>
  </div>
  <div class="hero-card" id="elec-card">
    <div class="label">Electricity (MO)</div>
    <div class="price" id="elec-price">--</div>
    <div class="unit">cents / kWh</div>
    <div class="change neutral" id="elec-period">--</div>
  </div>
</div>

<!-- LOCAL GAS PRICES -->
<div class="section" id="local-gas-section">
  <div class="section-title">
    <span class="dot" style="background:var(--accent-green)"></span>
    Local Gas Prices — Regular
    <span class="update-info" id="gas-update-info"></span>
  </div>
  <div class="gas-grid" id="gas-grid">
    <div class="loading">Loading local prices...</div>
  </div>
</div>

<!-- LOCAL DIESEL PRICES -->
<div class="section" id="local-diesel-section">
  <div class="section-title">
    <span class="dot" style="background:var(--accent-amber)"></span>
    Local Diesel Prices
    <span class="update-info" id="diesel-update-info"></span>
  </div>
  <div class="gas-grid" id="diesel-grid">
    <div class="loading">Loading diesel prices...</div>
  </div>
</div>

<!-- MIDWEST AVERAGES -->
<div class="section">
  <div class="section-title">
    <span class="dot" style="background:var(--accent-blue)"></span>
    Midwest Avg Gas Prices
    <span class="update-info" id="avg-update-info">Weekly via EIA</span>
  </div>
  <div class="avg-row" id="avg-row">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="clock" id="clock">--:--</div>
  <div class="last-update" id="last-update">Last refresh: --</div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const EIA_API_KEY = '4Chg5i2sMidH1VXagwA16Swah93vp8bFZRQJ5wbl';

// How often to refresh each source
const REFRESH_GASBUDDY_MS  = 4 * 60 * 60 * 1000; // 4 hours
const REFRESH_CRUDE_MS     = 2 * 60 * 60 * 1000;  // 2 hours
const REFRESH_ELEC_MS      = 12 * 60 * 60 * 1000;  // 12 hours
const REFRESH_MIDWEST_MS   = 6 * 60 * 60 * 1000;   // 6 hours

// ============================================================
//  CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
setInterval(updateClock, 1000);
updateClock();

function stampUpdate() {
  const now = new Date();
  document.getElementById('last-update').textContent =
    'Last refresh: ' + now.toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true
    });
}

// ============================================================
//  EIA: Crude Oil (WTI daily)
// ============================================================
async function fetchCrude() {
  try {
    const url = `https://api.eia.gov/v2/petroleum/pri/spt/data/?api_key=${EIA_API_KEY}`
      + `&frequency=daily&data[0]=value&facets[series][]=RWTC`
      + `&sort[0][column]=period&sort[0][direction]=desc&length=2`;
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.response.data;
    if (!rows || rows.length === 0) throw new Error('No crude data');

    const latest = rows[0];
    const prev = rows.length > 1 ? rows[1] : null;

    document.getElementById('crude-price').textContent = '$' + Number(latest.value).toFixed(2);

    if (prev) {
      const diff = latest.value - prev.value;
      const pct = ((diff / prev.value) * 100).toFixed(1);
      const arrow = diff > 0 ? '\u25B2' : diff < 0 ? '\u25BC' : '';
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
      document.getElementById('crude-change').textContent = `${arrow} $${Math.abs(diff).toFixed(2)} (${Math.abs(pct)}%)`;
      document.getElementById('crude-change').className = 'change ' + cls;
    }
  } catch (e) {
    console.error('Crude fetch error:', e);
    document.getElementById('crude-price').textContent = '--';
    document.getElementById('crude-change').textContent = 'Error loading';
    document.getElementById('crude-change').className = 'change neutral';
  }
}

// ============================================================
//  EIA: Missouri Electricity (monthly)
// ============================================================
async function fetchElectricity() {
  try {
    const url = `https://api.eia.gov/v2/electricity/retail-sales/data/?api_key=${EIA_API_KEY}`
      + `&frequency=monthly&data[0]=price&facets[stateid][]=MO&facets[sectorid][]=RES`
      + `&sort[0][column]=period&sort[0][direction]=desc&length=1`;
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.response.data;
    if (!rows || rows.length === 0) throw new Error('No electricity data');

    const latest = rows[0];
    document.getElementById('elec-price').textContent = Number(latest.price).toFixed(1) + '\u00A2';
    document.getElementById('elec-period').textContent = latest.period + ' avg';
    document.getElementById('elec-period').className = 'change neutral';
  } catch (e) {
    console.error('Electricity fetch error:', e);
    document.getElementById('elec-price').textContent = '--';
    document.getElementById('elec-period').textContent = 'Error loading';
  }
}

// ============================================================
//  EIA: Midwest Avg Gasoline (weekly)
// ============================================================
async function fetchMidwestAvg() {
  try {
    const products = [
      { code: 'EPM0', label: 'Regular' },
      { code: 'EPMM', label: 'Midgrade' },
      { code: 'EPMP', label: 'Premium' },
      { code: 'EPD2DXL0', label: 'Diesel' }
    ];

    const fetches = products.map(async (p) => {
      const url = `https://api.eia.gov/v2/petroleum/pri/gnd/data/?api_key=${EIA_API_KEY}`
        + `&frequency=weekly&data[0]=value&facets[duoarea][]=R20&facets[product][]=${p.code}`
        + `&sort[0][column]=period&sort[0][direction]=desc&length=1`;
      const res = await fetch(url);
      const json = await res.json();
      const rows = json.response.data;
      return {
        label: p.label,
        value: rows && rows.length > 0 ? rows[0].value : null,
        period: rows && rows.length > 0 ? rows[0].period : null
      };
    });

    const results = await Promise.all(fetches);
    const container = document.getElementById('avg-row');
    container.innerHTML = '';

    let periodStr = '';
    results.forEach(r => {
      if (r.period && !periodStr) periodStr = r.period;
      const div = document.createElement('div');
      div.className = 'avg-item';
      div.innerHTML = `
        <div class="grade">${r.label}</div>
        <div class="avg-price">${r.value !== null ? '$' + Number(r.value).toFixed(2) : '--'}</div>
      `;
      container.appendChild(div);
    });

    if (periodStr) {
      document.getElementById('avg-update-info').textContent = 'Week of ' + periodStr;
    }
  } catch (e) {
    console.error('Midwest avg fetch error:', e);
    document.getElementById('avg-row').innerHTML = '<div class="error-msg">Error loading Midwest averages</div>';
  }
}

// ============================================================
//  GasBuddy: Local Gas Prices
// ============================================================
async function fetchLocalGas() {
  try {
    // Fetch regular (fuel=1)
    const regularData = await fetchGasBuddyFuel(1);
    renderGasGrid('gas-grid', regularData, 'gas-update-info');

    // Fetch diesel (fuel=4)
    const dieselData = await fetchGasBuddyFuel(4);
    renderGasGrid('diesel-grid', dieselData, 'diesel-update-info');
  } catch (e) {
    console.error('GasBuddy fetch error:', e);
    document.getElementById('gas-grid').innerHTML =
      '<div class="error-msg">Unable to load local prices. Showing Midwest averages instead.</div>';
    document.getElementById('diesel-grid').innerHTML =
      '<div class="error-msg">Unable to load local diesel prices.</div>';
  }
}

async function fetchGasBuddyFuel(fuelType) {
  const query = {
    operationName: 'LocationBySearchTerm',
    variables: {
      fuel: fuelType,
      maxAge: 0,
      limit: 5,
      search: 'Cape Girardeau, MO'
    },
    query: `query LocationBySearchTerm($fuel: Int, $search: String!, $maxAge: Int, $limit: Int) {
      locationBySearchTerm(search: $search) {
        stations(fuel: $fuel, maxAge: $maxAge, limit: $limit) {
          results {
            id
            name
            address { line1 locality region postalCode }
            prices { fuelProduct credit { price postedTime } }
          }
        }
      }
    }`
  };

  const res = await fetch('https://www.gasbuddy.com/graphql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(query)
  });

  const json = await res.json();
  const stations = json?.data?.locationBySearchTerm?.stations?.results || [];
  return stations;
}

function renderGasGrid(gridId, stations, updateInfoId) {
  const container = document.getElementById(gridId);

  if (!stations || stations.length === 0) {
    container.innerHTML = '<div class="error-msg">No stations found</div>';
    return;
  }

  container.innerHTML = '';

  stations.forEach(station => {
    const price = station.prices?.[0]?.credit?.price;
    const postedTime = station.prices?.[0]?.credit?.postedTime;

    const row = document.createElement('div');
    row.className = 'gas-row';

    const age = postedTime ? timeAgo(new Date(postedTime)) : '';

    row.innerHTML = `
      <div class="station-name">${escapeHtml(station.name)}</div>
      <div class="station-addr">${escapeHtml(station.address?.line1 || '')}</div>
      <div class="gas-price">$${price != null ? Number(price).toFixed(2) : '--'}</div>
      <div class="gas-age">${age}</div>
    `;
    container.appendChild(row);
  });

  if (updateInfoId) {
    document.getElementById(updateInfoId).textContent = 'via GasBuddy';
  }
}

function timeAgo(date) {
  const now = new Date();
  const diffMs = now - date;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
//  INIT & REFRESH LOOPS
// ============================================================
async function init() {
  // Fire all fetches in parallel
  await Promise.allSettled([
    fetchCrude(),
    fetchElectricity(),
    fetchMidwestAvg(),
    fetchLocalGas()
  ]);
  stampUpdate();
}

init();

// Set up refresh intervals
setInterval(async () => { await fetchLocalGas(); stampUpdate(); }, REFRESH_GASBUDDY_MS);
setInterval(async () => { await fetchCrude(); stampUpdate(); }, REFRESH_CRUDE_MS);
setInterval(async () => { await fetchElectricity(); stampUpdate(); }, REFRESH_ELEC_MS);
setInterval(async () => { await fetchMidwestAvg(); stampUpdate(); }, REFRESH_MIDWEST_MS);
</script>
</body>
</html>
